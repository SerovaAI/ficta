name: gitleaks

# Secret scanning: scan PRs and weekly, over full history.
# Organization repos require GITLEAKS_LICENSE.

on:
  pull_request:
    branches: [main]
  schedule:
    - cron: "23 6 * * 1" # Mondays, off the :00 mark
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0 # full history, not just the tip, so old commits are scanned too
      - uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
