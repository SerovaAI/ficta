name: Publish

# Releases are driven by Changesets. On a push to main:
#   - if there are pending changesets, the action opens/updates a "Version Packages" PR
#     (bumps @serovaai/ficta + @serovaai/ficta-protocol together, writes their CHANGELOGs)
#   - when that PR is merged, the action runs `pnpm release` (changeset publish) to publish
#     both packages to npm and tag + create GitHub releases.
#
# Auth is npm trusted publishing (OIDC) — no NPM_TOKEN. This job must run as `publish.yml` in the
# `npm-publish` environment to match the trusted-publisher config on both packages. Do NOT add
# NODE_AUTH_TOKEN / NPM_TOKEN: any token (even empty) makes npm/pnpm skip OIDC.

on:
  push:
    branches:
      - main

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions: {}

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    environment: npm-publish
    permissions:
      contents: write # push the version-bump commit + git tags
      pull-requests: write # open/update the Version Packages PR
      id-token: write # OIDC trusted publishing
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Create Release PR or Publish
        id: changesets
        uses: changesets/action@v1
        with:
          publish: pnpm release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"
