name: CI and Release

# One workflow owns verification, secret scanning, and Changesets releases.
# Keep it at `.github/workflows/publish.yml`: npm trusted publishing binds both
# published packages to this filename and the `npm-publish` environment.
# Publishing uses OIDC; do not add NODE_AUTH_TOKEN or NPM_TOKEN because even an
# empty token makes npm/pnpm skip trusted publishing.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "23 6 * * 1" # Mondays, off the :00 mark
  workflow_dispatch:

concurrency:
  group: ci-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  verify:
    if: github.event_name != 'schedule' && (github.event_name != 'pull_request' || github.head_ref != 'changeset-release/main')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check
        run: pnpm check

      - name: Build
        run: pnpm build

  scan:
    if: github.event_name != 'pull_request' || github.head_ref != 'changeset-release/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0 # Scan full history, not only the tip.

      - name: Scan for secrets
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
          GITLEAKS_VERSION: 8.30.1

  release:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [verify, scan]
    runs-on: ubuntu-latest
    environment: npm-publish
    permissions:
      contents: write # push the version-bump commit + git tags
      pull-requests: write # open/update the Version Packages PR
      id-token: write # OIDC trusted publishing
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Create Release PR or Publish
        id: changesets
        uses: changesets/action@v1
        with:
          publish: pnpm release
        env:
          # The built-in token prevents the generated PR update from automatically
          # executing another CI cycle. Merging that PR still triggers this workflow.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"
