  - name: ZaIdNumberRecognizer
    supported_languages:
    - en
    type: predefined
    enabled: true
    country_code: za

  # High-value document shapes observed in invitation/legal-document traffic. These deliberately use
  # locale-agnostic entity names: a case/matter/reference number is still confidential even when the
  # exact issuing jurisdiction is unknown. Scoped `(?-i:...)` groups keep identifier letters uppercase
  # despite Presidio's global IGNORECASE regex flag.
  - name: FictaDocumentIdRecognizer
    supported_languages:
    - language: en
      context:
      - passport
      - passport number
      - identity
      - identity number
      - document number
      - reference number
      - registration number
      - permit
    type: custom
    enabled: true
    supported_entity: DOCUMENT_ID
    patterns:
    - name: Letter followed by eight digits
      regex: "\\b(?-i:[A-Z])\\d{8}\\b"
      score: 0.65
    - name: Structured mixed alphanumeric document identifier
      regex: "\\b(?-i:[A-Z])\\d{4}(?-i:[A-Z]{3})\\d{6}\\b"
      score: 0.85

  - name: FictaMauritiusPhoneRecognizer
    supported_languages:
    - language: en
      context: [phone, telephone, mobile, contact, call, reached]
    type: custom
    enabled: true
    country_code: mu
    supported_entity: PHONE_NUMBER
    patterns:
    - name: Mauritius international telephone number
      regex: "(?<!\\d)\\+230(?:[ .-]?\\d){8}\\b"
      score: 0.85

  # Municipal/utility account numbers (e.g. City of Johannesburg tax invoices) are bare 9-11 digit
  # runs with no checksum, so the base score stays below ficta's 0.5 threshold and only the context
  # enhancer (nearby "account"/"rekening" wording) can promote a match. Deliberately locale-agnostic
  # (an account number is confidential anywhere); the Afrikaans context words are additive tokens,
  # harmless outside ZA.
  - name: FictaAccountNumberRecognizer
    supported_languages:
    - language: en
      context:
      - account
      - account number
      - account no
      - acc no
      - rekening
      - rekeningnommer
      - meter
      - invoice
    type: custom
    enabled: true
    supported_entity: ACCOUNT_NUMBER
    patterns:
    - name: Bare 9-11 digit account number
      regex: "(?<!\\d)\\d{9,11}(?!\\d)"
      score: 0.3

  - name: HuggingFaceNerRecognizer
    supported_languages:
    - en
    type: predefined
    enabled: false

  - name: CryptoRecognizer
    type: predefined

  - name: DateRecognizer
    type: predefined
    enabled: false

  - name: EmailRecognizer
    type: predefined

  - name: IbanRecognizer
    type: predefined

  - name: IpRecognizer
    type: predefined

  - name: MedicalLicenseRecognizer
    type: predefined
    country_code: us

  - name: MacAddressRecognizer
    type: predefined

  - name: PhoneRecognizer
    type: predefined

  - name: UrlRecognizer
    type: predefined

  - name: InVoterRecognizer
    type: predefined
    enabled: false
    country_code: in

  - name: InGstinRecognizer
    supported_languages: 
    - en
    type: predefined
    enabled: false
    country_code: in

  - name: BasicLangExtractRecognizer
    supported_languages:
      - en
    type: predefined
    enabled: false
    config_path: presidio_analyzer/conf/langextract_config_basic.yaml

  - name: CaSinRecognizer
    supported_languages:
    - en
    type: predefined
    enabled: false
    country_code: ca
