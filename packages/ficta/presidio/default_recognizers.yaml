supported_languages:
  - en
global_regex_flags: 26

# Ficta's local Presidio registry: a complete, country-tagged registry config scoped at load
# time by the ``FICTA_PRESIDIO_SUPPORTED_COUNTRIES`` env var (see below). Company-registration,
# contextual date/address, alias, and OCR handling live in the Ficta recognizer registered by the
# derived Presidio image. Keep this file as a complete registry config; Presidio's Docker
# RECOGNIZER_REGISTRY_CONF_FILE replaces the default registry rather than overlaying it.

# Deployment scope: the ``FICTA_PRESIDIO_SUPPORTED_COUNTRIES`` env var (comma-separated
# ISO-3166-1 alpha-2, case-insensitive) controls which country-tagged recognizers below load.
# The pinned analyzer only exposes country filtering programmatically — its registry YAML schema
# rejects a top-level ``supported_countries`` key — so the derived image applies the filter in
# ``ficta_presidio/service.py``. Locale-agnostic recognizers (those without a ``country_code``
# below) always load regardless. Country-specific recognizers are only sound inside their home
# jurisdiction (e.g. UK_PASSPORT matches any 9-digit run), so scope stays load-time and
# per-deployment — there is deliberately no per-request widening.
#
# The shipped default (Dockerfile / docker-compose.sidecars.yml) is the SA-legal reference
# profile ``za,us,mu``: za (home jurisdiction), us (retained for parity with the original
# baseline — revisit whether a ZA deployment wants US identifiers on by default), mu (Mauritius
# phone shapes seen in SA legal traffic). Add a code to widen a deployment (e.g. ``uk``); remove
# one to narrow it. Restart the sidecar after editing.

recognizers:
  # Recognizers listed here can either be loaded from the recognizers defined in code (type: predefined),
  # or created based on the provided configuration (type: custom).
  # For predefined:
  # - If only a recognizer name is provided, a predefined recognizer with this name and default parameters will be loaded.
  # - If a parameter isn't provided, the default one would be loaded.
  # - Use 'class_name' to specify the Python class when using a custom 'name' for display/metadata
  # - The optional ``country_code`` field (ISO-3166-1 alpha-2) makes the recognizer's country tag
  #   visible to no-code YAML readers. It must match the recognizer class's ``COUNTRY_CODE``
  #   attribute; mismatches raise at load time. Locale-agnostic recognizers omit ``country_code``.
  # For custom:
  # - See an example configuration here: https://github.com/data-privacy-stack/presidio/blob/main/presidio-analyzer/presidio_analyzer/conf/example_recognizers.yaml
  # - Custom pattern recognizers with this configuration can be added to this file, with type: custom
  - name: CreditCardRecognizer
    supported_languages:
    - language: en
      context: [credit, card, visa, mastercard, cc, amex, discover, jcb, diners, maestro, instapayment]
    type: predefined

  - name: UsBankRecognizer
    supported_languages: 
    - en
    type: predefined
    country_code: us

  - name: UsLicenseRecognizer
    supported_languages: 
    - en
    type: predefined
    country_code: us

  - name: UsItinRecognizer
    supported_languages: 
    - en
    type: predefined
    country_code: us
  
  - name: UsPassportRecognizer
    supported_languages: 
    - en
    type: predefined
    country_code: us
  
  - name: UsSsnRecognizer
    supported_languages:
    - en
    type: predefined
    country_code: us

  - name: UsMbiRecognizer
    supported_languages:
    - en
    type: predefined
    enabled: false
    country_code: us

  - name: UsNpiRecognizer
    supported_languages:
    - en
    type: predefined
    enabled: false
    country_code: us

  # UK recognizers stay defined here but only load when a deployment adds `uk` to
