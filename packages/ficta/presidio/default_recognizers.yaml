    country_code: uk

  - name: UkPassportRecognizer
    supported_languages:
    - en
    type: predefined
    country_code: uk

  - name: UkPostcodeRecognizer
    supported_languages:
    - en
    type: predefined
    country_code: uk

  - name: UkVehicleRegistrationRecognizer
