# Ficta's Presidio NLP-engine config. Mounted into the analyzer as NLP_CONF_FILE (see
# docker-compose.sidecars.yml). It is a verbatim copy of the upstream image default
# (presidio-analyzer/presidio_analyzer/conf/default.yaml) with ONE deliberate change:
#
#   ORGANIZATION is removed from ner_model_configuration.labels_to_ignore.
#
# Upstream ignores ORGANIZATION ("Has many false positives"), which drops spaCy ORG evidence before
# a recognizer can inspect it. Ficta's derived Presidio image disables the raw SpacyRecognizer and
# feeds these NLP artifacts through FictaSpacyIdentityRecognizer instead. The custom recognizer applies
# document context and entity-shape gates before a PERSON/ORGANIZATION span leaves Presidio.
nlp_engine_name: spacy
models:
  -
    lang_code: en
    model_name: en_core_web_lg

ner_model_configuration:
  model_to_presidio_entity_mapping:
    PER: PERSON
    PERSON: PERSON
    NORP: NRP
    FAC: LOCATION
    LOC: LOCATION
    GPE: LOCATION
    LOCATION: LOCATION
    ORG: ORGANIZATION
    ORGANIZATION: ORGANIZATION
    DATE: DATE_TIME
    TIME: DATE_TIME

  low_confidence_score_multiplier: 0.4
  low_score_entity_names:
  -
  labels_to_ignore:
  # ORGANIZATION intentionally NOT ignored here (upstream ignores it) — see header.
  - CARDINAL
  - EVENT
  - LANGUAGE
  - LAW
  - MONEY
  - ORDINAL
  - PERCENT
  - PRODUCT
  - QUANTITY
  - WORK_OF_ART
