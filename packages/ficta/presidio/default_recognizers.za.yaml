  - name: ZaCompanyRegistrationRecognizer
    supported_languages:
    - language: en
      context:
      - CIPC
      - company registration
      - company reg
      - company number
      - enterprise number
      - registration number
      - registration no
      - reg no
    type: custom
    enabled: true
    supported_entity: ZA_COMPANY_REGISTRATION
    patterns:
    - name: South African company registration number
      regex: "\\b(?:19|20)\\d{2}/\\d{6}/\\d{2}\\b"
      score: 0.6
    country_code: za

