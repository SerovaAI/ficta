# Gateway/document and PII detection sidecars ficta's networked backends talk to. This file is the way
# to run them outside `pnpm dev` (which can manage them itself and reuses anything already healthy here):
#
#   pnpm sidecars           # gateway + engine profiles (document converter, presidio)
#   pnpm sidecars:openmed   # additionally start the opt-in OpenMed backend
#   pnpm sidecars:down      # stop all profiles
#
# Services are grouped by owner with compose profiles, mirroring which product depends on them:
#   gateway — document-converter (the gateway's /api/extract and /api/render sidecar)
#   engine  — presidio-analyzer (a proxy PII detection backend)
#   openmed — the opt-in learned-PII backend; only useful when `FICTA_PII_BACKENDS` (or the
#             config.toml `[pii] backends`) selects "openmed", so it is not started by default —
#             it is the heaviest sidecar here (image pull + model download on first start).
#
# The document converter and Presidio analyzer are built from the source checkout. OpenMed is pulled
# from its upstream registry. Set OPENMED_IMAGE to pin a tag or use a locally built image instead.
# After pulling changes under packages/ficta/presidio, rerun `pnpm sidecars`: `--build` refreshes the
# baked Ficta recognizer, and Compose recreates the analyzer so mounted recognizer/NLP config reloads.
#
# Ports bind loopback only, matching ficta's default backend URLs (document converter 5003,
# presidio 5002, openmed 5004). A deployment that needs network exposure must change that deliberately.

services:
  document-converter:
    profiles: ["gateway"]
    image: ficta-doc-converter:dev
    build:
      context: ./apps/gateway/sidecars/document-converter
    ports:
      - "127.0.0.1:5003:5003"
    environment:
      CONVERTER_BACKEND: ${FICTA_DOC_CONVERTER_BACKEND:-markitdown}
    healthcheck:
      test:
        [
          "CMD",
          "python3",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:5003/health', timeout=3)",
        ]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    restart: unless-stopped

  presidio-analyzer:
    profiles: ["engine"]
    image: ficta-presidio:dev
    build:
      context: ./packages/ficta/presidio
    ports:
      - "127.0.0.1:5002:3000"
    volumes:
      - ./packages/ficta/presidio/default_recognizers.yaml:/app/ficta-presidio-recognizers.yaml:ro
      # The NLP engine still emits raw NER spans internally; the Ficta Presidio recognizer applies the
      # legal-identity admission rules before any span leaves the sidecar.
      - ./packages/ficta/presidio/nlp_engine.za.yaml:/app/ficta-nlp-engine.yaml:ro
    environment:
      RECOGNIZER_REGISTRY_CONF_FILE: /app/ficta-presidio-recognizers.yaml
      NLP_CONF_FILE: /app/ficta-nlp-engine.yaml
      FICTA_PRESIDIO_NER: spacy
      # Deployment country scope: which country-tagged recognizers load (see the registry YAML
      # header). This is the SA-legal reference profile; edit per deployment and restart.
      FICTA_PRESIDIO_SUPPORTED_COUNTRIES: "za,us,mu"
    healthcheck:
      test:
        [
          "CMD",
          "python3",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:3000/health', timeout=3)",
        ]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3
    restart: unless-stopped

  openmed:
    profiles: ["openmed"]
    image: ${OPENMED_IMAGE:-ghcr.io/maziyarpanahi/openmed:latest}
    ports:
      - "127.0.0.1:5004:8080"
    environment:
      # Preload so a cold container is ready before the first request; the HF cache volume keeps
      # the model across restarts, so only the first start on a machine downloads it.
      OPENMED_SERVICE_PRELOAD_MODELS: ${OPENMED_PRELOAD_MODELS:-OpenMed/OpenMed-PII-SuperClinical-Small-44M-v1}
      # Required: the CPU image's torch rejects SDPA attention for the DeBERTa-based PII models.
      OPENMED_TORCH_ATTENTION_BACKEND: eager
      OPENMED_SERVICE_KEEP_ALIVE: ${OPENMED_KEEP_ALIVE:-10m}
      HF_TOKEN: ${HF_TOKEN:-}
    volumes:
      - openmed-hf-cache:/root/.cache/huggingface
    # The OpenMed image ships its own HEALTHCHECK, so `up --wait` blocks until it is actually ready.
    restart: unless-stopped

volumes:
  openmed-hf-cache:
