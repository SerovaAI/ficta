# Local Postgres for the reference deployment — loopback-only, persistent volume.
# Used unless /etc/ficta/gateway.env points DATABASE_URL at a managed instance.
# POSTGRES_PASSWORD comes from /etc/ficta/postgres.env (generated by install.sh).
services:
  postgres:
    image: postgres:16.6-alpine
    container_name: ficta-postgres
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_USER: ficta
      POSTGRES_DB: ficta
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set in /etc/ficta/postgres.env}
    volumes:
      - ficta-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ficta -d ficta"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  ficta-pgdata:
